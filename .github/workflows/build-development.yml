name: Build Development

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build for (all/android/ios)
        type: choice
        required: true
        default: all
        options:
          - all
          - android
          - ios
  push:
    branches: [development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repository
        uses: actions/checkout@v4

      - name: 📐 Setup monorepo
        uses: ./.github/actions/setup-monorepo
        with:
          expo-token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠️ Create .env file for Expo
        run: |
          echo "EXPO_PUBLIC_API_URL=${{ vars.EXPO_PUBLIC_API_URL_DEVELOPMENT }}" >> apps/mobile/.env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> apps/mobile/.env
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> apps/mobile/.env
          echo "GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}" >> apps/mobile/.env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> apps/mobile/.env
          echo "VERCEL_AUTOMATION_BYPASS_SECRET=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" >> apps/mobile/.env

      - name: 👷 Build packages for mobile
        run: pnpm run -w build:mobile

      - name: ⚒️ Build mobile on dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }} # only run this step if the workflow was triggered by a dispatch event
        working-directory: apps/mobile
        run: eas build --non-interactive --no-wait --platform=${{ github.event.inputs.platform }} --profile=development

      - name: ⚒️ Build mobile on push
        if: ${{ github.event_name == 'push' }} # only run this step if the workflow was triggered by a push event
        working-directory: apps/mobile
        run: eas build --non-interactive --no-wait --platform=android --profile=development
